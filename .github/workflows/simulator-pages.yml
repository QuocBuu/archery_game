name: Deploy Web Simulator

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "application/sources/**"
      - "application/simulator/**"
      - ".github/workflows/simulator-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Build
        run: make -C application/simulator web

      - name: Stage Pages artifact
        run: |
          mkdir -p pages
          cp application/simulator/web/build/dist/* pages/
          touch pages/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
